name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Package.swift uses swift-tools-version 6.2.4; pin stable Xcode for a reproducible Apple toolchain.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build release binary and zip
        run: |
          swift build -c release
          BIN="$(swift build -c release --show-bin-path)/ToyBot"
          test -x "$BIN"
          zip -j toy-bot-macos.zip "$BIN"

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: toy-bot-macos.zip
